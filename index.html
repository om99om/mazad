<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مزاد اللوحات</title>

<style>
body{
background:#111;
font-family:Tahoma;
text-align:center;
padding:20px;
color:white;
}

h1{
margin-bottom:25px;
}

.controls{
margin-bottom:30px;
}

input{
padding:12px;
font-size:22px;
width:160px;
margin:5px;
text-align:center;
}

button{
padding:12px 25px;
font-size:22px;
cursor:pointer;
}

.plate{
width:700px;
max-width:95%;
height:240px;
background:white;
margin:auto;
border:5px solid #666;
border-radius:20px;
overflow:hidden;
color:black;
}

.top{
display:flex;
height:120px;
border-bottom:3px solid #666;
}

.bottom{
display:flex;
height:120px;
}

.numbers,
.letters{
width:42%;
display:flex;
justify-content:center;
align-items:center;
font-size:65px;
font-weight:bold;
}

.logo{
width:16%;
border-left:3px solid #666;
border-right:3px solid #666;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-weight:bold;
}

.logo span{
font-size:30px;
color:green;
}

.en{
font-size:55px;
letter-spacing:8px;
}

.num{
font-size:70px;
}

.small{
font-size:22px;
}
</style>
</head>

<body>

<h1>مزاد اللوحات المباشر</h1>

<div class="controls">
<input id="letters" placeholder="مثال: ح ر م">
<input id="numbers" placeholder="9060">
<button onclick="showPlate()">عرض</button>
</div>

<div class="plate">

<div class="top">
<div class="letters" id="arLetters">ح ر م</div>

<div class="logo">
<span>🌴</span>
<div class="small">KSA</div>
</div>

<div class="numbers num" id="arNumbers">٩٠٦٠</div>
</div>

<div class="bottom">
<div class="letters en" id="enLetters">Z R J</div>

<div class="logo">
SA
</div>

<div class="numbers num" id="enNumbers">9060</div>
</div>

</div>

<script>

const map = {
'ا':'A','أ':'A','ب':'B','ح':'J','د':'D',
'ر':'R','س':'S','ص':'X','ط':'T',
'ع':'E','ق':'G','ك':'K','ل':'L',
'م':'Z','ن':'N','ه':'H','و':'U','ي':'V'
};

function showPlate(){

let ar=document.getElementById("letters").value.trim();
let nums=document.getElementById("numbers").value.trim();

document.getElementById("arLetters").innerText=ar;
document.getElementById("arNumbers").innerText=nums;

let eng="";

ar.split(" ").forEach(x=>{
eng += (map[x] || x) + " ";
});

document.getElementById("enLetters").innerText=eng.trim();
document.getElementById("enNumbers").innerText=nums;

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>مزاد اللوحات</title>

<style>

body{
margin:0;
padding:20px;
background:#f2f2f2;
font-family:Tahoma,Arial;
text-align:center;
}

h2{
margin-bottom:20px;
}

.controls{
background:#fff;
padding:15px;
border-radius:12px;
max-width:1200px;
margin:auto;
margin-bottom:20px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

input,select,button{
padding:10px;
font-size:20px;
margin:5px;
text-align:center;
}

button{
background:#1d7f2f;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.plate{
background:white;
border:4px solid #222;
border-radius:10px;
max-width:1100px;
margin:auto;
overflow:hidden;
}

.toptype{
background:#148f2c;
color:white;
font-size:34px;
font-weight:bold;
padding:10px;
}

.row1{
display:grid;
grid-template-columns:1fr 220px 1fr;
border-bottom:2px solid #ccc;
}

.row2{
display:grid;
grid-template-columns:1fr 220px 1fr;
}

.box{
padding:25px;
}

.arletters{
font-size:80px;
font-weight:bold;
}

.enletters{
font-size:45px;
margin-top:10px;
}

.numbers{
font-size:95px;
font-weight:bold;
}

.logo{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:80px;
color:#148f2c;
font-weight:bold;
}

.logo small{
font-size:28px;
color:black;
}

@media(max-width:700px){

.arletters{
font-size:45px;
}

.enletters{
font-size:25px;
}

.numbers{
font-size:55px;
}

.logo{
font-size:45px;
}

.row1,.row2{
grid-template-columns:1fr 120px 1fr;
}

}

</style>
</head>
<body>

<h2>مزاد اللوحات المباشر</h2>

<div class="controls">

<select id="type">
<option>خصوصي</option>
<option>نقل</option>
</select>

<input id="l1" maxlength="1" placeholder="الحرف الأول">
<input id="l2" maxlength="1" placeholder="الحرف الثاني">
<input id="l3" maxlength="1" placeholder="الحرف الثالث">

<input id="num" maxlength="4" placeholder="رقم اللوحة">

<button onclick="showPlate()">عرض</button>

</div>

<div class="plate">

<div class="toptype" id="ptype">
خصوصي
</div>

<div class="row1">

<div class="box">
<div class="arletters" id="arLetters">و و ي</div>
<div class="enletters" id="enLetters">V U V</div>
</div>

<div class="logo">
🌴
⚔️
</div>

<div class="box">
<div class="numbers" id="arNumTop">122</div>
<div class="enletters" id="enNumTop">122</div>
</div>

</div>

<div class="row2">

<div class="box"></div>

<div class="logo">
<small>المملكة العربية السعودية</small>
</div>

<div class="box"></div>

</div>

</div>

<script>

const map={
'ا':'A',
'ب':'B',
'ح':'J',
'د':'D',
'ر':'R',
'س':'S',
'ص':'X',
'ط':'T',
'ع':'E',
'ق':'G',
'ك':'K',
'ل':'L',
'م':'Z',
'ن':'N',
'ه':'H',
'و':'U',
'ي':'Y'
};

function showPlate(){

let a=document.getElementById("l1").value || "";
let b=document.getElementById("l2").value || "";
let c=document.getElementById("l3").value || "";

let num=document.getElementById("num").value || "";

document.getElementById("ptype").innerText=
document.getElementById("type").value;

document.getElementById("arLetters").innerText=
a+" "+b+" "+c;

document.getElementById("enLetters").innerText=
(map[a]||a)+" "+
(map[b]||b)+" "+
(map[c]||c);

document.getElementById("arNumTop").innerText=num;
document.getElementById("enNumTop").innerText=num;

}

</script>

</body>
</html>
